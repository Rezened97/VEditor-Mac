name: Build macOS .app

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .app with PyInstaller
        run: |
          pyinstaller --windowed --clean --name vid6 --additional-hooks-dir=. vid6.py

      - name: Verify app bundle exists
        run: |
          test -d "dist/vid6.app"
          test -f "dist/vid6.app/Contents/Info.plist"

      - name: Zip the .app bundle properly
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent vid6.app vid6-macos-app.zip

      - name: Upload zipped .app artifact
        uses: actions/upload-artifact@v6
        with:
          name: vid6-macos-app
          path: dist/vid6-macos-app.zip
