name: Build macOS .pkg

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .app with PyInstaller
        run: |
          pyinstaller --windowed --clean --name vid6 --additional-hooks-dir=. vid6.py

      - name: Verify app bundle exists
        run: |
          test -d "dist/vid6.app"
          test -f "dist/vid6.app/Contents/Info.plist"

      - name: Build .pkg installer
        run: |
          pkgbuild \
            --component "dist/vid6.app" \
            --install-location "/Applications" \
            "dist/vid6-macos-installer.pkg"

      - name: Verify .pkg exists
        run: |
          test -f "dist/vid6-macos-installer.pkg"

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v6
        with:
          name: vid6-macos-pkg
          path: dist/vid6-macos-installer.pkg
